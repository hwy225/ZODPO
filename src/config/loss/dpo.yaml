# config/loss/dpo.yaml
# Direct Preference Optimization (DPO) stage

name: dpo

# KL penalty coefficient (higher = stay closer to reference model)
beta: 0.1

# Path to the SFT model used as the frozen reference for DPO.
# MUST be set when running the DPO stage, e.g.:
#   python train.py loss=dpo loss.sft_model_path=outputs/my_sft/final_model ...
sft_model_path: ???

num_epochs: null
