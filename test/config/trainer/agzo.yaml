# config/trainer/agzo.yaml
# AGZO (Activation-Guided Zeroth-Order) trainer settings

name: agzo          # must match the key used in train.py's TRAINER_MAP

# SGD-style zeroth-order learning rate
lr: 1e-6

# finite-difference epsilon
eps: 1e-3

# number of block-power-iteration steps to compute the activation subspace
power_iter_steps: 5

# rank of the activation subspace (r >= 1)
# rank=1 is sufficient for most cases; higher rank uses more memory but
# captures a richer subspace of activation differences
rank: 1